<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJMAX ランキング管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="admin">
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <div id="auth-overlay" class="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="auth-card">
      <h1 id="auth-title">管理者ページ</h1>
      <p>管理者パスワードを入力してください。</p>
      <form id="auth-form" class="auth-form">
        <input id="auth-password" type="password" autocomplete="current-password" required placeholder="管理者パスワード">
        <button type="submit">認証する</button>
      </form>
      <p id="auth-error" class="error-message" aria-live="polite"></p>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loading-box">
      <div class="loading-spinner" aria-hidden="true"></div>
      <span class="loading-label">通信中...</span>
    </div>
  </div>

  <header class="site-header">
    <div>
      <p class="eyebrow">DJMAX</p>
      <h1>ランキング管理</h1>
    </div>
    <a class="admin-link" href="index.html">利用者ページへ</a>
  </header>

  <main class="layout admin-layout">
    <section class="panel">
      <h2>プレイヤー編集</h2>
      <form id="player-form" class="stack-form">
        <label>登録済みプレイヤー
          <select id="player-select" size="8"></select>
        </label>

        <label>新しいプレイヤー名
          <input id="new-player-name" type="text" placeholder="例: PLAYER-2" maxlength="32">
        </label>

        <div class="tool-buttons">
          <button type="button" id="add-player">プレイヤー追加</button>
          <button type="button" id="delete-player" class="danger">選択プレイヤー削除</button>
        </div>
      </form>
      <p id="form-message" class="muted" aria-live="polite"></p>
    </section>

    <section class="panel">
      <h2>運用補助</h2>
      <div class="tool-buttons">
        <button id="export-json" class="secondary">データをJSONで書き出し</button>
        <label class="secondary pseudo-file">
          JSON読込
          <input id="import-json" type="file" accept="application/json" hidden>
        </label>
        <button id="clear-records" class="danger">全スコア削除</button>
      </div>
      <p class="muted small">GitHub Pagesは静的配信のため、サーバ保存はありません。同じランキングを複数端末で共有したい場合はJSON書き出し/読込を使って同期してください。</p>
    </section>

    <section class="panel">
      <h2>OCRレイアウト調整</h2>
      <div class="ocr-layout-grid">
        <div class="ocr-layout-tools">
          <label>プレビュー画像
            <input id="ocr-layout-image" type="file" accept="image/*">
          </label>

          <label>プリセット
            <select id="ocr-layout-preset"></select>
          </label>

          <div class="tool-buttons compact">
            <button type="button" id="ocr-layout-new" class="secondary">新規プリセット</button>
            <button type="button" id="ocr-layout-save">保存</button>
            <button type="button" id="ocr-layout-reset" class="secondary">初期化</button>
            <button type="button" id="ocr-layout-export" class="secondary">JSON書き出し</button>
            <label class="secondary pseudo-file">
              JSON読込
              <input id="ocr-layout-import" type="file" accept="application/json" hidden>
            </label>
          </div>

          <label>編集中の領域
            <select id="ocr-layout-region"></select>
          </label>

          <div class="ocr-range-grid">
            <label>X
              <input id="ocr-range-x" type="range" min="0" max="1000" step="1">
              <span id="ocr-range-x-value" class="small muted">0.000</span>
            </label>
            <label>Y
              <input id="ocr-range-y" type="range" min="0" max="1000" step="1">
              <span id="ocr-range-y-value" class="small muted">0.000</span>
            </label>
            <label>W
              <input id="ocr-range-w" type="range" min="10" max="1000" step="1">
              <span id="ocr-range-w-value" class="small muted">0.000</span>
            </label>
            <label>H
              <input id="ocr-range-h" type="range" min="10" max="1000" step="1">
              <span id="ocr-range-h-value" class="small muted">0.000</span>
            </label>
          </div>
        </div>

        <div class="ocr-layout-preview-wrap">
          <div id="ocr-layout-preview-stage" class="ocr-layout-preview-stage">
            <img id="ocr-layout-preview-image" alt="OCR調整用プレビュー">
            <div id="ocr-layout-overlay" class="ocr-layout-overlay"></div>
          </div>
        </div>
      </div>
      <p id="ocr-layout-message" class="muted small" aria-live="polite"></p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
