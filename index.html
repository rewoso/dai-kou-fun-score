<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJMAX 大興奮ランキング</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="user">
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <div id="auth-overlay" class="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="auth-card">
      <h1 id="auth-title">DJMAX ランキング</h1>
      <p>利用者用パスワードを入力してください。</p>
      <form id="auth-form" class="auth-form">
        <input id="auth-password" type="password" autocomplete="current-password" required placeholder="パスワード">
        <button type="submit">入室する</button>
      </form>
      <p id="auth-error" class="error-message" aria-live="polite"></p>
    </div>
  </div>

  <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loading-box">
      <div class="loading-spinner" aria-hidden="true"></div>
      <span class="loading-label">通信中...</span>
    </div>
  </div>

  <div id="daiko-fun-overlay" class="daiko-fun-overlay" role="alertdialog" aria-modal="true" aria-label="大興奮" hidden>
    <div class="daiko-fun-card">
      <p class="daiko-fun-label">🏆 BEST SCORE 🏆</p>
      <p class="daiko-fun-text">大興奮！！！！</p>
      <p class="daiko-fun-sub">タップして閉じる</p>
    </div>
  </div>

  <header class="site-header">
    <div>
      <p class="eyebrow">DJMAX</p>
      <h1>大興奮ランキング</h1>
    </div>
    <a class="admin-link" href="admin.html">管理者ページへ</a>
  </header>

  <main class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>スコア入力</h2>
        <button type="button" id="score-form-toggle" class="toggle-btn" aria-expanded="true" aria-controls="score-form-body">閉じる</button>
      </div>
      <div id="score-form-body">
      <form id="user-score-form" class="stack-form">
        <label>プレイヤー名
          <select id="entry-user" required></select>
        </label>

        <label>曲名フィルタ
          <input id="song-filter" type="text" placeholder="曲名を入力して絞り込み">
        </label>

        <label>曲名
          <select id="entry-song" required></select>
        </label>

        <div>
          <p class="picker-label">ボタン数</p>
          <div id="entry-button-group" class="choice-group"></div>
        </div>

        <div>
          <p class="picker-label">難易度</p>
          <div id="entry-difficulty-group" class="choice-group"></div>
        </div>

        <label>スコア
          <input id="entry-score" type="number" min="0" step="1" required placeholder="例: 987654">
        </label>

        <button type="submit">スコア登録</button>
      </form>
      <p id="entry-message" class="muted" aria-live="polite"></p>
      </div>
    </section>

    <section class="panel filters">
      <h2>絞り込み</h2>
      <div class="filter-grid">
        <div class="filter-user-field">
          <label for="filter-user">ユーザー名</label>
          <div class="filter-user-control">
            <select id="filter-user"><option value="">すべて</option></select>
            <label class="inline-toggle" for="filter-user-multi">
              <input id="filter-user-multi" type="checkbox">
              複数選択する
            </label>
          </div>
          <div id="filter-user-extra-list" class="filter-user-extra-list" hidden></div>
          <button id="filter-user-add" type="button" class="secondary user-add-btn" hidden>ユーザー追加</button>
        </div>
        <label>
          曲名フィルタ
          <input id="filter-song-query" type="text" placeholder="曲名を入力して絞り込み">
        </label>
        <label>
          曲名
          <select id="filter-song"><option value="">すべて</option></select>
        </label>
        <label>
          ボタン数
          <select id="filter-button"><option value="">すべて</option></select>
        </label>
        <label>
          難易度
          <select id="filter-difficulty"><option value="">すべて</option></select>
        </label>
        <label>
          直近更新件数
          <select id="filter-recent-limit">
            <option value="" selected>すべて</option>
            <option value="10">10件</option>
            <option value="20">20件</option>
            <option value="30">30件</option>
            <option value="40">40件</option>
            <option value="50">50件</option>
          </select>
        </label>
      </div>
      <button id="clear-filters" class="secondary">絞り込みリセット</button>
    </section>

    <section class="panel ranking">
      <div class="panel-head">
        <h2>ランキング</h2>
        <p id="record-count" class="muted"></p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>順位</th>
              <th>ユーザー名</th>
              <th>曲名</th>
              <th>ボタン</th>
              <th>難易度</th>
              <th>スコア</th>
              <th>RATE</th>
              <th>RANK</th>
              <th>更新日時</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
      <p id="empty-state" class="empty-state">まだスコアが登録されていません。</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="app.js"></script>
</body>
</html>
