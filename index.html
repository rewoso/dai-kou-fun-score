<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJMAX 身内ランキング</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="user">
  <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

  <div id="auth-overlay" class="auth-overlay" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="auth-card">
      <h1 id="auth-title">DJMAX ランキング</h1>
      <p>利用者用パスワードを入力してください。</p>
      <form id="auth-form" class="auth-form">
        <input id="auth-password" type="password" autocomplete="current-password" required placeholder="パスワード">
        <button type="submit">入室する</button>
      </form>
      <p id="auth-error" class="error-message" aria-live="polite"></p>
    </div>
  </div>

  <header class="site-header">
    <div>
      <p class="eyebrow">DJMAX</p>
      <h1>身内スコアランキング</h1>
    </div>
    <a class="admin-link" href="admin.html">管理者ページへ</a>
  </header>

  <main class="layout">
    <section class="panel filters">
      <h2>絞り込み</h2>
      <div class="filter-grid">
        <label>
          ユーザー名
          <select id="filter-user"><option value="">すべて</option></select>
        </label>
        <label>
          曲名
          <select id="filter-song"><option value="">すべて</option></select>
        </label>
        <label>
          ボタン数
          <select id="filter-button"><option value="">すべて</option></select>
        </label>
        <label>
          難易度
          <select id="filter-difficulty"><option value="">すべて</option></select>
        </label>
      </div>
      <button id="clear-filters" class="secondary">絞り込みリセット</button>
    </section>

    <section class="panel ranking">
      <div class="panel-head">
        <h2>ランキング</h2>
        <p id="record-count" class="muted"></p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>順位</th>
              <th>ユーザー名</th>
              <th>曲名</th>
              <th>ボタン</th>
              <th>難易度</th>
              <th>スコア</th>
              <th>更新日時</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
      <p id="empty-state" class="empty-state">まだスコアが登録されていません。</p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="app.js"></script>
</body>
</html>
